name: Atualizador da Copa

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# PERMISSÃO CRUCIAL: Permite ao robô fazer push do calendário para o repositório
permissions:
  contents: write

jobs:
  atualizar-banco:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar o script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python atualizador.py

      - name: Guardar o Calendário no Repositório
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add calendario.ics
          git diff-index --quiet HEAD || git commit -m "🤖 Atualização automática do calendário [.ics]"
          g
          it push
